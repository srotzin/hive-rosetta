[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "hive-rosetta-hive"
version = "0.1.0"
description = "Hive-flavored profile for hive-rosetta. Defaults inference traffic to hivecompute, attaches DID/Beacon attribution. Free forever."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
dependencies = [
    "hive-rosetta>=0.1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "httpx>=0.27",
]

[project.urls]
Homepage = "https://github.com/srotzin/hive-rosetta"
Repository = "https://github.com/srotzin/hive-rosetta"

[tool.hatch.build.targets.wheel]
packages = ["hive_rosetta_hive"]

[tool.pytest.ini_options]
testpaths = ["tests"]
