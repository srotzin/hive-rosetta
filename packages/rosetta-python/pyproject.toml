[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "hive-rosetta"
version = "0.1.0"
description = "Open x402 v2 SDK for Python — Base mainnet + Sepolia, EIP-3009, scheme=exact."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
dependencies = [
    "eth-account>=0.13",
    "eth-utils>=4",
    "pydantic>=2",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "httpx>=0.27",
]

[tool.hatch.build.targets.wheel]
packages = ["hive_rosetta"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
